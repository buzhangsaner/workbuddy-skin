<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>WorkBuddy Dream Skin Editor</title>
<style>
:root{--accent:#a142f4;--secondary:#ff73bd;--surface:#fff5fa;--ink:#2a1752;--radius:22px;--glass:.76;--art:linear-gradient(135deg,#f7d9ff,#ffd7e8 55%,#fff4cc)}*{box-sizing:border-box}body{margin:0;color:#352052;background:#f5eef9;font:14px/1.5 Inter,"Microsoft YaHei",sans-serif}.app{min-height:100vh;display:grid;grid-template-columns:340px 1fr}.panel{padding:28px;background:#fffafdee;border-right:1px solid #eadcf1;overflow:auto}.brand{font-size:25px;font-weight:800}.brand i{color:var(--accent);font-style:normal}.sub{color:#7d6b8d;margin:3px 0 22px}.group{border:0;padding:0;margin:0 0 20px}.group legend{font-weight:700;margin-bottom:10px}.field{display:grid;grid-template-columns:1fr auto;align-items:center;gap:12px;margin:10px 0}.field input[type=color]{width:44px;height:32px;padding:2px;border:1px solid #dac9e6;border-radius:10px;background:white}.field input[type=range]{width:145px}.file{display:block;border:1px dashed #c9a9de;border-radius:14px;padding:12px;background:white}input[type=file]{width:100%;margin-top:8px}.actions{display:grid;grid-template-columns:1fr 1fr;gap:9px}.actions button,.import{border:0;border-radius:12px;padding:11px 12px;font-weight:700;cursor:pointer;text-align:center;background:#eee5f5;color:#51326d}.actions .primary{background:linear-gradient(135deg,var(--accent),var(--secondary));color:white}.import input{display:none}.stage{padding:38px;display:grid;place-items:center;overflow:auto;background:radial-gradient(circle at 90% 10%,#ead5ff,transparent 30%),#eee9f4}.window{width:min(1100px,100%);min-height:680px;border-radius:calc(var(--radius) + 6px);overflow:hidden;box-shadow:0 30px 80px #4b2f6c33;background:rgba(255,255,255,var(--glass));backdrop-filter:blur(18px);position:relative}.titlebar{height:48px;display:flex;align-items:center;padding:0 18px;background:#ffffffb5;border-bottom:1px solid #ffffff}.dots{display:flex;gap:7px}.dots i{width:11px;height:11px;border-radius:50%;background:#ff7390}.dots i:nth-child(2){background:#ffc85d}.dots i:nth-child(3){background:#66d3a3}.titlebar span{margin:auto;font-weight:700}.work{display:grid;grid-template-columns:190px 1fr;min-height:632px}.side{padding:20px 12px;background:#fff8fcaa;border-right:1px solid #ead9ee}.side h3{padding:0 12px;color:var(--accent)}.nav{padding:10px 12px;border-radius:13px;margin:5px 0}.nav.active{background:linear-gradient(110deg,color-mix(in srgb,var(--accent) 18%,white),color-mix(in srgb,var(--secondary) 15%,white));color:var(--accent);font-weight:800}.main{padding:28px;position:relative;color:var(--ink)}.hero{min-height:235px;border-radius:var(--radius);padding:30px;position:relative;overflow:hidden;background:linear-gradient(90deg,#fffaf0e8,#fff7fbbb),var(--art) center/cover;box-shadow:0 16px 40px #732d9f1c}.hero:after{content:'✦  ·  ✧  ·  ✦';position:absolute;right:28px;top:22px;color:var(--accent);letter-spacing:8px}.hero h1{font-size:34px;margin:45px 0 4px}.hero p{color:#795e87}.composer{margin-top:22px;background:#ffffffd6;border:1px solid #fff;border-radius:var(--radius);padding:18px;box-shadow:0 14px 38px #6f3c8617}.input{height:62px;color:#95869f}.tools{display:flex;justify-content:space-between;align-items:center}.chips span{display:inline-block;padding:7px 10px;margin-right:6px;background:#f7eff9;border-radius:10px}.send{width:38px;height:38px;border:0;border-radius:12px;color:#fff;background:linear-gradient(135deg,var(--accent),var(--secondary))}.status{min-height:22px;margin-top:12px;color:#816d8f}@media(max-width:850px){.app{grid-template-columns:1fr}.panel{border-right:0}.stage{padding:18px}.work{grid-template-columns:125px 1fr}.side{font-size:12px}.main{padding:16px}}
</style></head><body><div class="app"><aside class="panel"><div class="brand">Dream Skin <i>Editor</i></div><p class="sub">所见即所得 · 离线 · 安全主题包</p>
<fieldset class="group"><legend>主题颜色</legend><label class="field">星光紫<input data-key="accent" type="color" value="#a142f4"></label><label class="field">梦幻粉<input data-key="secondary" type="color" value="#ff73bd"></label><label class="field">奶油底色<input data-key="surface" type="color" value="#fff5fa"></label><label class="field">文字颜色<input data-key="ink" type="color" value="#2a1752"></label></fieldset>
<fieldset class="group"><legend>质感</legend><label class="field">圆角 <input id="radius" type="range" min="8" max="36" value="22"></label><label class="field">玻璃透明度 <input id="glass" type="range" min="55" max="96" value="76"></label></fieldset>
<label class="file">背景图（PNG / JPG / WebP）<input id="image" type="file" accept="image/png,image/jpeg,image/webp"></label><p class="status" id="status">修改参数即可实时预览</p>
<div class="actions"><button id="reset">恢复默认</button><label class="import">Import Theme<input id="import" type="file" accept="application/json,.json"></label><button class="primary" id="export">Export Theme</button><button id="copy">复制 JSON</button></div></aside>
<main class="stage"><section class="window" id="preview"><header class="titlebar"><div class="dots"><i></i><i></i><i></i></div><span>WorkBuddy</span></header><div class="work"><nav class="side"><h3>✦ WorkBuddy</h3><div class="nav active">☁ 新对话</div><div class="nav">◇ 任务</div><div class="nav">⌘ 终端</div><div class="nav">⚙ 设置</div></nav><article class="main"><div class="hero"><h1 id="heroName">Fiona Starlight</h1><p id="heroTag">让灵感在星光里发生</p></div><div class="composer"><div class="input">今天想创造什么？</div><div class="tools"><div class="chips"><span>＋ 附件</span><span>⌁ 模型</span></div><button class="send">↑</button></div></div></article></div></section></main></div>
<script>
const defaults={schemaVersion:1,id:'my-dream-skin',name:'My Dream Skin',tagline:'让灵感在星光里发生',quote:'MAKE SOMETHING WONDERFUL',image:'background.png',colors:{accent:'#a142f4',secondary:'#ff73bd',surface:'#fff5fa',ink:'#2a1752'},editor:{radius:22,glass:76}};let theme=structuredClone(defaults),imageData='';const $=s=>document.querySelector(s),status=t=>$('#status').textContent=t;
function safe(t,n){return String(t||'').replace(/[\u0000-\u001f\u007f]/g,' ').trim().slice(0,n)}function valid(x){const allowed=['schemaVersion','id','name','tagline','quote','image','colors','editor'];if(!x||Object.keys(x).some(k=>!allowed.includes(k)))throw Error('主题包含不允许的字段');if(x.schemaVersion!==1||!/^[a-z0-9][a-z0-9-]{1,47}$/.test(x.id))throw Error('主题 ID 不合法');for(const k of ['accent','secondary','surface','ink'])if(!/^#[0-9a-f]{6}$/i.test(x.colors?.[k]))throw Error('颜色格式不合法');if(!/^[a-zA-Z0-9][a-zA-Z0-9._-]{0,127}\.(png|jpe?g|webp)$/i.test(x.image))throw Error('图片文件名不合法');return{schemaVersion:1,id:x.id,name:safe(x.name,64),tagline:safe(x.tagline,100),quote:safe(x.quote,80),image:x.image,colors:{accent:x.colors.accent,secondary:x.colors.secondary,surface:x.colors.surface,ink:x.colors.ink}}}
function render(){for(const[k,v]of Object.entries(theme.colors)){document.documentElement.style.setProperty('--'+k,v);const el=document.querySelector(`[data-key="${k}"]`);if(el)el.value=v}document.documentElement.style.setProperty('--radius',(theme.editor?.radius||22)+'px');document.documentElement.style.setProperty('--glass',(theme.editor?.glass||76)/100);if(imageData)document.documentElement.style.setProperty('--art',`url(${JSON.stringify(imageData)})`);$('#radius').value=theme.editor?.radius||22;$('#glass').value=theme.editor?.glass||76;$('#heroName').textContent=theme.name;$('#heroTag').textContent=theme.tagline}
document.querySelectorAll('[data-key]').forEach(el=>el.oninput=()=>{theme.colors[el.dataset.key]=el.value;render()});$('#radius').oninput=e=>{theme.editor.radius=+e.target.value;render()};$('#glass').oninput=e=>{theme.editor.glass=+e.target.value;render()};$('#image').onchange=e=>{const f=e.target.files[0];if(!f||!/^image\/(png|jpeg|webp)$/.test(f.type)||f.size>16*1024*1024)return status('请选择 16MB 以内的 PNG/JPG/WebP');const r=new FileReader;r.onload=()=>{imageData=r.result;theme.image=f.name.replace(/[^a-zA-Z0-9._-]/g,'-');render();status('背景图已载入预览')};r.readAsDataURL(f)};
function output(){const {editor,...portable}=theme;return JSON.stringify(valid(portable),null,2)}$('#export').onclick=()=>{const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([output()],{type:'application/json'}));a.download='theme.json';a.click();URL.revokeObjectURL(a.href);status('已导出 theme.json（背景图请一并放入主题目录）')};$('#copy').onclick=async()=>{await navigator.clipboard.writeText(output());status('主题 JSON 已复制')};$('#reset').onclick=()=>{theme=structuredClone(defaults);imageData='';document.documentElement.style.removeProperty('--art');render();status('已恢复默认参数')};$('#import').onchange=async e=>{try{const raw=JSON.parse(await e.target.files[0].text()),x=valid(raw);theme={...structuredClone(defaults),...x,colors:{...x.colors},editor:raw.editor&&Number.isFinite(+raw.editor.radius)&&Number.isFinite(+raw.editor.glass)?{radius:Math.min(36,Math.max(8,+raw.editor.radius)),glass:Math.min(96,Math.max(55,+raw.editor.glass))}:defaults.editor};render();status('主题已安全导入')}catch(err){status('导入失败：'+err.message)}};render();
</script></body></html>
