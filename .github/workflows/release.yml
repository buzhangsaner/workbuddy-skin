name: Build release installers

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run check

  windows:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Bundle Node.js runtime
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path runtime -Force | Out-Null
          $NodePath = (Get-Command node).Source
          Copy-Item -LiteralPath $NodePath -Destination runtime/node.exe
          Copy-Item -LiteralPath (Join-Path (Split-Path $NodePath) 'LICENSE') -Destination runtime/LICENSE.node.txt
      - name: Build Windows installer
        shell: pwsh
        run: |
          $Version = if ($env:GITHUB_REF -like 'refs/tags/*') { "${{ github.ref_name }}".TrimStart('v') } else { '0.6.0' }
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" "/DAppVersion=$Version" packaging/windows/workbuddy-dream-skin.iss
      - name: Build Windows skin manager
        run: npm run manager:dist:win
      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            dist/WorkBuddy-Dream-Skin-Setup.exe
            dist-manager/*.exe

  macos:
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Bundle Node.js runtime
        shell: bash
        run: |
          mkdir -p runtime
          node_path="$(command -v node)"
          cp "$node_path" runtime/node
          cp "$(cd "$(dirname "$node_path")/.." && pwd)/LICENSE" runtime/LICENSE.node.txt
          chmod +x runtime/node packaging/macos/*.sh
      - name: Build macOS DMG
        run: ./packaging/macos/build-dmg.sh
      - name: Build macOS skin manager
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npm run manager:dist:mac
      - uses: actions/upload-artifact@v4
        with:
          name: macos-installer
          path: |
            dist/WorkBuddy-Dream-Skin.dmg
            dist-manager/*.dmg

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [windows, macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --title "WorkBuddy Dream Skin $GITHUB_REF_NAME" --generate-notes
